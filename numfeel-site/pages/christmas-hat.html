<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="上传头像添加圣诞贴图，支持拖拽、缩放、旋转，可叠加多个贴图，一键下载。">
  <title>圣诞帽头像生成器 | 数字直觉</title>
  <script src="../../components/header.js" defer></script>
  <link rel="stylesheet" href="../../components/header.css">
  <style>
    .container { max-width: 520px; margin: 0 auto; }
    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--nf-paper);
      margin-bottom: 6px;
    }
    .page-header .subtitle {
      color: var(--nf-muted);
      font-size: 0.9rem;
    }
    .upload-area {
      background: var(--nf-panel);
      border: 2px dashed var(--nf-line);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover {
      border-color: var(--nf-accent);
      background: var(--nf-accent-soft);
    }
    .upload-area.dragover {
      border-color: var(--nf-moss);
      background: rgba(136,149,74,0.12);
    }
    .upload-icon { font-size: 48px; margin-bottom: 10px; }
    .upload-text { color: var(--nf-muted); font-size: 0.95rem; }
    #fileInput { display: none; }
    .editor { display: none; }
    .editor.active { display: block; }
    .canvas-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: var(--nf-panel);
      border-radius: 12px;
      border: 1px solid var(--nf-line);
      overflow: hidden;
      touch-action: none;
    }
    #avatarCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .sticker-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .sticker {
      position: absolute;
      pointer-events: auto;
      cursor: move;
      touch-action: none;
    }
    .sticker img {
      width: 100%;
      height: 100%;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .sticker .resize-handle {
      position: absolute;
      width: 28px;
      height: 28px;
      background: var(--nf-paper);
      border: 2px solid var(--nf-accent);
      border-radius: 50%;
      cursor: nwse-resize;
      right: -14px;
      bottom: -14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      box-shadow: var(--nf-shadow);
    }
    .sticker .delete-handle {
      position: absolute;
      width: 24px;
      height: 24px;
      background: #d94040;
      color: white;
      border-radius: 50%;
      cursor: pointer;
      right: -12px;
      top: -12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      box-shadow: var(--nf-shadow);
    }
    .hat-selector {
      margin-top: 16px;
    }
    .hat-selector h3 {
      color: var(--nf-paper);
      font-size: 0.9rem;
      margin-bottom: 10px;
      font-weight: 500;
    }
    .hat-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }
    .hat-item {
      aspect-ratio: 1;
      border: 2px solid var(--nf-line);
      border-radius: 8px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.2s;
      background: var(--nf-panel);
      padding: 4px;
    }
    .hat-item:hover {
      border-color: var(--nf-accent);
      transform: scale(1.05);
    }
    .hat-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--nf-accent);
      color: white;
    }
    .btn-primary:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: var(--nf-panel);
      color: var(--nf-paper);
      border: 1px solid var(--nf-line);
    }
    .btn-secondary:hover {
      background: var(--nf-panel-strong);
    }
    .tips {
      background: var(--nf-accent-soft);
      border-left: 3px solid var(--nf-accent);
      padding: 12px 15px;
      border-radius: 0 8px 8px 0;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--nf-muted);
      line-height: 1.6;
    }
    .tips strong { color: var(--nf-accent); }
    .culture-note {
      background: var(--nf-panel);
      border: 1px solid var(--nf-line);
      border-radius: 12px;
      padding: 18px;
      margin-top: 20px;
    }
    .culture-note h3 {
      color: var(--nf-accent);
      margin-bottom: 10px;
      font-size: 0.95rem;
    }
    .culture-note p {
      color: var(--nf-muted);
      line-height: 1.8;
      font-size: 0.88rem;
    }
  </style>
</head>
<body class="numfeel-shell">
  <div class="container">
    <div class="page-header">
      <h1>🎅 圣诞帽头像生成器</h1>
      <p class="subtitle">上传头像 → 选择贴图 → 拖拽调整 → 下载</p>
    </div>
    
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📷</div>
      <p class="upload-text">点击或拖拽上传头像</p>
      <p class="upload-text" style="font-size: 0.8rem; margin-top: 8px;">支持 JPG、PNG 格式</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    
    <div class="editor" id="editor">
      <div class="canvas-container" id="canvasContainer">
        <canvas id="avatarCanvas"></canvas>
        <div class="sticker-layer" id="stickerLayer"></div>
      </div>
      
      <div class="hat-selector">
        <h3>🎄 点击添加圣诞贴图（可添加多个）</h3>
        <div class="hat-grid" id="hatGrid"></div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-secondary" id="resetBtn">🔄 重新上传</button>
        <button class="btn btn-primary" id="downloadBtn">💾 下载头像</button>
      </div>
      
      <div class="tips">
        <strong>操作提示：</strong>拖拽移动贴图位置，拖拽右下角↘️缩放+旋转，点击❌删除
      </div>
    </div>
    
    <div class="culture-note">
      <h3>🏮 关于传统文化与节日</h3>
      <p>
        圣诞节作为西方节日传入中国，已成为年轻人社交娱乐的一部分。与此同时，我们也有丰富的传统节日：
        <strong>春节</strong>团圆、<strong>元宵</strong>灯火、<strong>端午</strong>龙舟、<strong>中秋</strong>明月……
        弘扬传统文化，不是简单排斥外来文化，而是让我们的节日更有仪式感。
        <br>敬请期待：<strong>春节头像生成器</strong> 🧧
      </p>
    </div>
  </div>

  <script>
    const hatImages = Array.from({length: 18}, (_, i) => `../images/christmas/${i + 1}.png`);
    
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const editor = document.getElementById('editor');
    const canvas = document.getElementById('avatarCanvas');
    const ctx = canvas.getContext('2d');
    const stickerLayer = document.getElementById('stickerLayer');
    const hatGrid = document.getElementById('hatGrid');
    const canvasContainer = document.getElementById('canvasContainer');
    
    let userImage = null;
    let canvasSize = 400;
    let stickers = [];
    let stickerIdCounter = 0;

    hatImages.forEach((src, index) => {
      const item = document.createElement('div');
      item.className = 'hat-item';
      item.innerHTML = `<img src="${src}" alt="贴图${index + 1}">`;
      item.onclick = () => addSticker(src);
      hatGrid.appendChild(item);
    });

    uploadArea.onclick = () => fileInput.click();
    uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); };
    uploadArea.ondragleave = () => uploadArea.classList.remove('dragover');
    uploadArea.ondrop = (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
    };
    fileInput.onchange = (e) => { if (e.target.files[0]) loadImage(e.target.files[0]); };

    function loadImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          userImage = img;
          uploadArea.style.display = 'none';
          editor.classList.add('active');
          requestAnimationFrame(() => { initCanvas(); });
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function initCanvas() {
      const containerWidth = canvasContainer.clientWidth;
      if (containerWidth === 0) {
        requestAnimationFrame(initCanvas);
        return;
      }
      canvasSize = containerWidth;
      canvas.width = canvasSize;
      canvas.height = canvasSize;
      drawAvatar();
    }

    function drawAvatar() {
      if (!userImage) return;
      ctx.clearRect(0, 0, canvasSize, canvasSize);
      const size = Math.min(userImage.width, userImage.height);
      const sx = (userImage.width - size) / 2;
      const sy = (userImage.height - size) / 2;
      ctx.drawImage(userImage, sx, sy, size, size, 0, 0, canvasSize, canvasSize);
    }

    function addSticker(src) {
      const id = stickerIdCounter++;
      const sticker = document.createElement('div');
      sticker.className = 'sticker';
      sticker.dataset.id = id;
      
      const initialSize = canvasSize * 0.35;
      const initialX = (canvasSize - initialSize) / 2;
      const initialY = canvasSize * 0.05;
      
      sticker.style.cssText = `
        width: ${initialSize}px;
        height: ${initialSize}px;
        left: ${initialX}px;
        top: ${initialY}px;
        transform: rotate(0deg);
      `;
      
      sticker.innerHTML = `
        <img src="${src}" draggable="false">
        <div class="delete-handle">×</div>
        <div class="resize-handle">↘</div>
      `;
      
      const stickerData = {
        id, element: sticker, src,
        x: initialX, y: initialY,
        size: initialSize, rotation: 0
      };
      stickers.push(stickerData);
      
      setupStickerEvents(sticker, stickerData);
      stickerLayer.appendChild(sticker);
    }

    function setupStickerEvents(sticker, data) {
      let isDragging = false;
      let isResizing = false;
      let startX, startY, startLeft, startTop, startSize, startRotation, centerX, centerY;

      const deleteHandle = sticker.querySelector('.delete-handle');
      const resizeHandle = sticker.querySelector('.resize-handle');

      deleteHandle.onclick = (e) => {
        e.stopPropagation();
        sticker.remove();
        stickers = stickers.filter(s => s.id !== data.id);
      };

      sticker.onpointerdown = (e) => {
        if (e.target === resizeHandle || e.target === deleteHandle) return;
        isDragging = true;
        sticker.setPointerCapture(e.pointerId);
        const rect = canvasContainer.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        startLeft = data.x;
        startTop = data.y;
      };

      sticker.onpointermove = (e) => {
        if (!isDragging) return;
        const rect = canvasContainer.getBoundingClientRect();
        data.x = startLeft + (e.clientX - rect.left - startX);
        data.y = startTop + (e.clientY - rect.top - startY);
        sticker.style.left = data.x + 'px';
        sticker.style.top = data.y + 'px';
      };

      sticker.onpointerup = () => { isDragging = false; };

      resizeHandle.onpointerdown = (e) => {
        e.stopPropagation();
        isResizing = true;
        resizeHandle.setPointerCapture(e.pointerId);
        const rect = canvasContainer.getBoundingClientRect();
        centerX = data.x + data.size / 2;
        centerY = data.y + data.size / 2;
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        startSize = data.size;
        startRotation = data.rotation;
        const dx = startX - centerX;
        const dy = startY - centerY;
        this.startAngle = Math.atan2(dy, dx);
        this.startDist = Math.sqrt(dx * dx + dy * dy);
      };

      resizeHandle.onpointermove = (e) => {
        if (!isResizing) return;
        const rect = canvasContainer.getBoundingClientRect();
        const dx = (e.clientX - rect.left) - centerX;
        const dy = (e.clientY - rect.top) - centerY;
        const angle = Math.atan2(dy, dx);
        const dist = Math.sqrt(dx * dx + dy * dy);
        data.rotation = startRotation + (angle - this.startAngle) * 180 / Math.PI;
        const newSize = Math.max(40, Math.min(canvasSize * 0.9, startSize * (dist / this.startDist)));
        const sizeDiff = newSize - data.size;
        data.size = newSize;
        data.x -= sizeDiff / 2;
        data.y -= sizeDiff / 2;
        centerX = data.x + data.size / 2;
        centerY = data.y + data.size / 2;
        sticker.style.width = data.size + 'px';
        sticker.style.height = data.size + 'px';
        sticker.style.left = data.x + 'px';
        sticker.style.top = data.y + 'px';
        sticker.style.transform = `rotate(${data.rotation}deg)`;
      };

      resizeHandle.onpointerup = () => { isResizing = false; };
    }

    document.getElementById('resetBtn').onclick = () => {
      stickerLayer.innerHTML = '';
      stickers = [];
      editor.classList.remove('active');
      uploadArea.style.display = 'block';
      fileInput.value = '';
    };

    document.getElementById('downloadBtn').onclick = async () => {
      const exportCanvas = document.createElement('canvas');
      const exportSize = 800;
      exportCanvas.width = exportSize;
      exportCanvas.height = exportSize;
      const exportCtx = exportCanvas.getContext('2d');
      const size = Math.min(userImage.width, userImage.height);
      const sx = (userImage.width - size) / 2;
      const sy = (userImage.height - size) / 2;
      exportCtx.drawImage(userImage, sx, sy, size, size, 0, 0, exportSize, exportSize);
      const scale = exportSize / canvasSize;
      for (const s of stickers) {
        await new Promise(resolve => {
          const img = new Image();
          img.onload = () => {
            const cx = (s.x + s.size / 2) * scale;
            const cy = (s.y + s.size / 2) * scale;
            exportCtx.save();
            exportCtx.translate(cx, cy);
            exportCtx.rotate(s.rotation * Math.PI / 180);
            exportCtx.drawImage(img, -s.size * scale / 2, -s.size * scale / 2, s.size * scale, s.size * scale);
            exportCtx.restore();
            resolve();
          };
          img.src = s.src;
        });
      }
      const link = document.createElement('a');
      link.download = 'christmas-avatar.png';
      link.href = exportCanvas.toDataURL('image/png');
      link.click();
    };

    window.onresize = () => {
      if (!userImage) return;
      const oldSize = canvasSize;
      const newSize = canvasContainer.clientWidth;
      canvasSize = newSize;
      canvas.width = canvasSize;
      canvas.height = canvasSize;
      drawAvatar();
      const scale = newSize / oldSize;
      stickers.forEach(s => {
        s.x *= scale;
        s.y *= scale;
        s.size *= scale;
        s.element.style.left = s.x + 'px';
        s.element.style.top = s.y + 'px';
        s.element.style.width = s.size + 'px';
        s.element.style.height = s.size + 'px';
      });
    };
  </script>
</body>
</html>
