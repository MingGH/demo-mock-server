<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="点击一个节点，看看故障如何像雪崩一样吞噬整个网络。四种网络拓扑，三个可调参数，测试你的系统在故障面前能撑多久。">
  <title>越修越崩：级联故障模拟器 | 数字直觉</title>
  <script src="../../components/header.js" defer></script>
  <link rel="stylesheet" href="../../components/header.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <div class="header">
    <h1><i class="ti ti-zap-off"></i> 越修越崩：级联故障模拟器</h1>
    <p>点击画布上的任意节点，模拟一次故障。看着负载像多米诺骨牌一样传下去，直到整个网络崩溃——或者幸存。</p>
  </div>

  <!-- ── 控制面板 ── -->
  <div class="section">
    <h2><i class="ti ti-adjustments"></i> 网络参数</h2>
    <div class="settings-row">
      <div class="setting-group">
        <label>拓扑结构</label>
        <select id="topology" onchange="regenerate()">
          <option value="random">随机网络</option>
          <option value="scale-free" selected>无标度网络（社交/CDN）</option>
          <option value="grid">网格网络（电网/存储）</option>
          <option value="modular">模块化网络（微服务）</option>
        </select>
      </div>
      <div class="setting-group">
        <label>耦合密度</label>
        <input type="range" id="coupling" min="10" max="90" value="55" oninput="document.getElementById('couplingVal').textContent=this.value+'%'; regenerate()">
        <span class="range-val" id="couplingVal">55%</span>
      </div>
      <div class="setting-group">
        <label>容量余量</label>
        <input type="range" id="capacity" min="5" max="95" value="12" oninput="document.getElementById('capacityVal').textContent=this.value+'%'; regenerate()">
        <span class="range-val" id="capacityVal">12%</span>
      </div>
      <div class="setting-group">
        <label>防御策略</label>
        <select id="strategy" onchange="regenerate()">
          <option value="none" selected>不加防御</option>
          <option value="hub">加固枢纽</option>
          <option value="distributed">均匀增容</option>
        </select>
      </div>
    </div>
    <div class="action-row">
      <button class="btn btn-secondary" onclick="regenerate()">
        <i class="ti ti-refresh"></i> 重新生成
      </button>
      <button class="btn btn-primary" onclick="randomTrigger()">
        <i class="ti ti-bolt"></i> 随机引爆
      </button>
    </div>
  </div>

  <!-- ── 画布区 ── -->
  <div class="section">
    <div class="canvas-hint">
      <i class="ti ti-click"></i> <strong>点击任意节点</strong> 引爆它，观察级联故障的传播路径
    </div>
    <div class="canvas-wrap">
      <canvas id="networkCanvas"></canvas>
    </div>
    <div class="legend-row">
      <span><span class="legend-dot" style="background:#60a5fa"></span>健康</span>
      <span><span class="legend-dot" style="background:#fbbf24"></span>高负载</span>
      <span><span class="legend-dot" style="background:#f87171"></span>超载</span>
      <span><span class="legend-dot" style="background:#444"></span>已崩溃</span>
      <span><span class="legend-dot" style="background:#f87171;box-shadow:0 0 6px #f87171"></span>当前波次</span>
    </div>
  </div>

  <!-- ── 结果面板 ── -->
  <div class="section hidden" id="resultPanel">
    <h2><i class="ti ti-chart-bar"></i> 故障报告</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="val" id="res-survival">--</div>
        <div class="lbl">节点存活率</div>
      </div>
      <div class="stat-card">
        <div class="val" id="res-failed">--</div>
        <div class="lbl">崩溃节点数</div>
      </div>
      <div class="stat-card">
        <div class="val" id="res-steps">--</div>
        <div class="lbl">级联步数</div>
      </div>
      <div class="stat-card">
        <div class="val" id="res-component">--</div>
        <div class="lbl">最大连通分量</div>
      </div>
      <div class="stat-card gold">
        <div class="val" id="res-score">--</div>
        <div class="lbl">韧性评分</div>
      </div>
    </div>
    <div class="insight-box" id="resultInsight"></div>
  </div>

  <!-- ── 社区统计 ── -->
  <div class="section">
    <h2><i class="ti ti-users-group"></i> 全局数据</h2>
    <div id="globalStats" class="global-stats">加载中...</div>
  </div>

  <!-- ── 排行榜 ── -->
  <div class="section">
    <h2><i class="ti ti-trophy"></i> 最韧性的网络配置</h2>
    <div id="lbList" class="lb-list"><div class="lb-loading">加载中...</div></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
