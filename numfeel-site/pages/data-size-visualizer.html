<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="1MB/1GB/1TB到底有多大？用动画和类比让你直观感受数据的重量，理解数字世界中不同量级的差异。">
  <title>数据大小可视化 | 数字直觉</title>
  <script src="../components/header.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      color: #e4e4e4;
      overflow-x: hidden;
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }

    .header { text-align: center; margin: 20px 0 50px; }
    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #7b2fff, #ff2daf, #00d4ff);
      background-size: 300% 100%;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient 5s ease infinite;
    }
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .header p { color: rgba(255,255,255,0.5); margin-top: 15px; font-size: 16px; }

    /* 单位选择器 */
    .unit-selector {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 50px;
      flex-wrap: wrap;
    }
    .unit-btn {
      padding: 15px 35px;
      font-size: 18px;
      font-weight: 700;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      background: transparent;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }
    .unit-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #00d4ff, #7b2fff);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: -1;
    }
    .unit-btn:hover { border-color: #00d4ff; color: white; transform: scale(1.05); }
    .unit-btn.active { border-color: transparent; color: white; transform: scale(1.1); }
    .unit-btn.active::before { opacity: 1; }

    /* 主展示区 */
    .showcase {
      background: linear-gradient(180deg, rgba(123,47,255,0.1) 0%, rgba(0,212,255,0.05) 100%);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 50px 30px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }
    .showcase::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 50%);
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    .size-display {
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .size-number {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.6) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 80px rgba(0,212,255,0.5);
    }
    .size-unit {
      font-size: 3rem;
      color: #00d4ff;
      font-weight: 600;
      margin-left: 10px;
    }
    .size-bytes {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.4);
      margin-top: 10px;
      font-family: 'Courier New', monospace;
    }

    /* 类比卡片 */
    .analogies {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .analogy-card {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 25px;
      transition: all 0.4s;
      position: relative;
      overflow: hidden;
    }
    .analogy-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0,212,255,0.3);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .analogy-card .icon {
      font-size: 40px;
      margin-bottom: 15px;
      display: block;
    }
    .analogy-card .title {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    .analogy-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #00d4ff;
      margin-bottom: 5px;
    }
    .analogy-card .desc {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      line-height: 1.5;
    }

    /* 粒子动画容器 */
    .particles-section {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 40px;
      position: relative;
      min-height: 300px;
    }
    .particles-section h3 {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
    }
    .particles-container {
      position: relative;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #00d4ff;
      border-radius: 50%;
      opacity: 0;
      animation: particleFly 2s ease-out forwards;
    }
    @keyframes particleFly {
      0% { transform: scale(0) translate(0, 0); opacity: 1; }
      100% { transform: scale(1) translate(var(--tx), var(--ty)); opacity: 0.3; }
    }
    .byte-counter {
      font-size: 3rem;
      font-weight: 700;
      color: #7b2fff;
      font-family: 'Courier New', monospace;
      text-align: center;
      text-shadow: 0 0 30px rgba(123,47,255,0.5);
    }

    /* 比例尺 */
    .scale-section {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 30px;
      margin-bottom: 40px;
    }
    .scale-section h3 {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      margin-bottom: 25px;
      text-align: center;
    }
    .scale-bar {
      position: relative;
      height: 60px;
      background: rgba(0,0,0,0.3);
      border-radius: 30px;
      overflow: hidden;
    }
    .scale-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #7b2fff, #ff2daf);
      border-radius: 30px;
      transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 20px;
      min-width: 80px;
    }
    .scale-fill span {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }
    .scale-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
    .scale-labels span.active { color: #00d4ff; font-weight: 600; }

    /* 时间线 */
    .timeline {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 30px;
      margin-bottom: 40px;
    }
    .timeline h3 {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      margin-bottom: 25px;
      text-align: center;
    }
    .timeline-items {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .timeline-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      transition: all 0.3s;
    }
    .timeline-item:hover { background: rgba(0,212,255,0.1); }
    .timeline-item .year {
      font-size: 12px;
      color: #7b2fff;
      font-weight: 600;
      min-width: 50px;
    }
    .timeline-item .event {
      flex: 1;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }
    .timeline-item .price {
      font-size: 13px;
      color: #00d4ff;
      font-weight: 600;
    }

    /* 趣味事实 */
    .fun-facts {
      background: linear-gradient(135deg, rgba(255,45,175,0.1), rgba(123,47,255,0.1));
      border-radius: 20px;
      border: 1px solid rgba(255,45,175,0.2);
      padding: 30px;
    }
    .fun-facts h3 {
      color: #ff2daf;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .fun-facts ul {
      list-style: none;
    }
    .fun-facts li {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .fun-facts li:last-child { border-bottom: none; }
    .fun-facts li::before { content: '💡'; }

    @media (max-width: 600px) {
      .size-number { font-size: 4rem; }
      .size-unit { font-size: 1.5rem; }
      .unit-btn { padding: 12px 25px; font-size: 14px; }
    }
  </style>
</head>

  </div>

  <div class="scale-section">

    <div class="scale-labels">

      <span data-unit="eb">1EB</span>
      <span data-unit="zb">1ZB</span>
      <span data-unit="yb">1YB</span>
    </div>
  </div>

  <div class="timeline" id="timeline"></div>

  <div class="fun-facts" id="funFacts"></div>
</div>

    ],
    timeline: [
      { year: '1991', event: '万维网诞生', price: '数据时代开始' },
      { year: '2022', event: 'ISO新增RB和QB单位', price: '为未来做准备' },
      { year: '2024', event: '人类数据总量约0.1YB', price: '还差10倍' }
    ],
    facts: [
      '1YB = 1024ZB = 1万亿TB，目前人类还没产生过这么多数据',
      'YB之上还有RB(Ronnabyte)和QB(Quettabyte)，2022年新增',
      '理论上，整个宇宙的信息量远超YB，但我们还没有能力测量'
    ],
    scalePercent: 100
  }
};

let currentUnit = 'mb';
let particleAnimation = null;

function selectUnit(unit) {
  currentUnit = unit;
  
  // 更新按钮状态
  document.querySelectorAll('.unit-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.unit === unit);
  });
  
  // 更新比例尺标签
  document.querySelectorAll('.scale-labels span').forEach(span => {
    span.classList.toggle('active', span.dataset.unit === unit);
  });
  
  const data = DATA[unit];
  
  // 更新主显示
  document.getElementById('sizeNumber').textContent = '1';
  document.getElementById('sizeUnit').textContent = data.name;
  document.getElementById('sizeBytes').textContent = `= ${data.bytesFormatted} 字节`;
  
  // 更新类比卡片
  renderAnalogies(data.analogies);
  
  // 更新比例尺
  document.getElementById('scaleFill').style.width = data.scalePercent + '%';
  document.getElementById('scaleLabel').textContent = '1 ' + data.name;
  
  // 更新时间线
  renderTimeline(data.timeline);
  
  // 更新趣味事实
  renderFacts(data.facts);
  
  // 启动粒子动画
  startParticleAnimation(data.bytes);
}

function renderAnalogies(analogies) {
  const html = analogies.map(a => `
    <div class="analogy-card">
      <span class="icon">${a.icon}</span>
      <div class="title">${a.title}</div>
      <div class="value">${a.value}</div>
      <div class="desc">${a.desc}</div>
    </div>
  `).join('');
  document.getElementById('analogies').innerHTML = html;
}

function renderTimeline(timeline) {
  const html = `
    <h3>⏰ 存储成本变迁</h3>
    <div class="timeline-items">
      ${timeline.map(t => `
        <div class="timeline-item">
          <div class="year">${t.year}</div>
          <div class="event">${t.event}</div>
          <div class="price">${t.price}</div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('timeline').innerHTML = html;
}

function renderFacts(facts) {
  const html = `
    <h3>🎯 冷知识</h3>
    <ul>
      ${facts.map(f => `<li>${f}</li>`).join('')}
    </ul>
  `;
  document.getElementById('funFacts').innerHTML = html;
}

function startParticleAnimation(bytes) {
  // 清除之前的动画
  if (particleAnimation) {
    cancelAnimationFrame(particleAnimation);
  }
  
  const container = document.getElementById('particlesContainer');
  const counter = document.getElementById('byteCounter');
  
  // 清除旧粒子
  container.querySelectorAll('.particle').forEach(p => p.remove());
  
  // 根据字节数决定显示策略
  let displayBytes, suffix, particleCount;
  if (bytes >= 1e21) {
    displayBytes = bytes / 1e21;
    suffix = ' 十万亿亿';
    particleCount = 300;
  } else if (bytes >= 1e18) {
    displayBytes = bytes / 1e18;
    suffix = ' 百亿亿';
    particleCount = 250;
  } else if (bytes >= 1e15) {
    displayBytes = bytes / 1e15;
    suffix = ' 千万亿';
    particleCount = 220;
  } else if (bytes >= 1e12) {
    displayBytes = bytes / 1e12;
    suffix = ' 万亿';
    particleCount = 200;
  } else if (bytes >= 1e9) {
    displayBytes = bytes / 1e9;
    suffix = ' 亿';
    particleCount = 150;
  } else if (bytes >= 1e6) {
    displayBytes = bytes / 1e6;
    suffix = ' 百万';
    particleCount = 100;
  } else if (bytes >= 1e3) {
    displayBytes = bytes / 1e3;
    suffix = ' 千';
    particleCount = 50;
  } else {
    displayBytes = bytes;
    suffix = '';
    particleCount = 30;
  }
  
  // 动画计数
  let current = 0;
  const duration = 2000;
  const startTime = performance.now();
  
  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    
    // 缓动函数
    const easeOut = 1 - Math.pow(1 - progress, 3);
    current = displayBytes * easeOut;
    
    counter.textContent = current.toFixed(current < 10 ? 2 : 0) + suffix + ' 字节';
    
    // 添加粒子
    if (Math.random() < 0.3 && container.querySelectorAll('.particle').length < particleCount) {
      createParticle(container);
    }
    
    if (progress < 1) {
      particleAnimation = requestAnimationFrame(animate);
    }
  }
  
  particleAnimation = requestAnimationFrame(animate);
}

function createParticle(container) {
  const particle = document.createElement('div');
  particle.className = 'particle';
  
  // 随机位置和方向
  const angle = Math.random() * Math.PI * 2;
  const distance = 50 + Math.random() * 100;
  const tx = Math.cos(angle) * distance;
  const ty = Math.sin(angle) * distance;
  
  particle.style.setProperty('--tx', tx + 'px');
  particle.style.setProperty('--ty', ty + 'px');
  particle.style.left = '50%';
  particle.style.top = '50%';
  particle.style.background = `hsl(${180 + Math.random() * 60}, 100%, 60%)`;
  
  container.appendChild(particle);
  
  // 动画结束后移除
  setTimeout(() => particle.remove(), 2000);
}

// 初始化
selectUnit('mb');
</script>

</body>
</html>
