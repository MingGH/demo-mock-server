name: Deploy
on:
  push:
    branches:
      - main
    paths:
      - 'numfeel-service/**'
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: numfeel-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'maven'
      - name: Get project version
        id: get_version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "Project version is $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Build with Maven
        run: |
          ./mvnw clean package dockerfile:build -DskipTests
      - name: Log in to Ali Container
        run: |
          docker login --username=${{ secrets.ALI_CONTAINER_USER }} --password="${{ secrets.ALI_CONTAINER_PWD }}" registry.cn-hongkong.aliyuncs.com
      - name: Push Docker image to Ali Container
        run: |
          docker tag registry.cn-hongkong.aliyuncs.com/runnable-run/numfeel-service:${{ env.VERSION }} registry.cn-hongkong.aliyuncs.com/runnable-run/numfeel-service:latest
          docker push registry.cn-hongkong.aliyuncs.com/runnable-run/numfeel-service:latest
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            numfeel-service/k3s-deployment-prod.yaml
          sparse-checkout-cone-mode: false
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      - name: Set up KUBE_CONFIG
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > K3S_KUBE_CONFIG.yaml
          chmod 600 K3S_KUBE_CONFIG.yaml
      - name: Deploy to K3s
        run: |
          kubectl --kubeconfig=K3S_KUBE_CONFIG.yaml apply -f numfeel-service/k3s-deployment-prod.yaml
          kubectl --kubeconfig=K3S_KUBE_CONFIG.yaml patch deployment demo-mock-server-deployment -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"date\":\"`date +'%s'`\"}}}}}" -n runnable-run
