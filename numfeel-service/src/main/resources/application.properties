spring.application.name=numfeel-service

# HTTP server
server.port=8080

# R2DBC MySQL (connection info injected via env vars, never hardcoded)
spring.r2dbc.url=r2dbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:demomockserver}
spring.r2dbc.username=${MYSQL_USER:root}
spring.r2dbc.password=${MYSQL_PASSWORD:}
spring.r2dbc.pool.initial-size=1
spring.r2dbc.pool.max-size=5
spring.r2dbc.pool.max-idle-time=30m

# Upstream stats API (api.996.ninja) token, injected via env var
ninja.api.token=${NINJA_API_TOKEN:}
ninja.api.base-url=https://api.996.ninja

# Logging: keep noise down, mirror old logback config
logging.level.root=INFO
logging.level.io.netty=WARN
logging.level.io.r2dbc=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# DDL is executed best-effort at startup by SchemaInitializer (non-fatal if DB is down),
# so disable Spring's blocking SQL init which would halt boot on connection failure.
spring.sql.init.mode=never
