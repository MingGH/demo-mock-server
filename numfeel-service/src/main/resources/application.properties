spring.application.name=numfeel-service

# HTTP 服务器
server.port=8080

# R2DBC MySQL（连接信息通过环境变量注入，切勿硬编码）
spring.r2dbc.url=r2dbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:demomockserver}
spring.r2dbc.username=${MYSQL_USER:root}
spring.r2dbc.password=${MYSQL_PASSWORD:}
spring.r2dbc.pool.initial-size=1
spring.r2dbc.pool.max-size=5
spring.r2dbc.pool.max-idle-time=30m

# 上游统计 API (api.996.ninja) token，通过环境变量注入
ninja.api.token=${NINJA_API_TOKEN:}
ninja.api.base-url=https://api.996.ninja

# Cloudflare Turnstile 密钥（切勿硬编码到代码中）
turnstile.secret-key=${TURNSTILE_SECRET_KEY:}

# Umami 统计分析（demo 排行榜）；凭据通过环境变量注入，切勿硬编码
umami.base-url=${UMAMI_BASE_URL:https://umami.runnable.run}
umami.website-id=${UMAMI_WEBSITE_ID:60f1c767-3f2a-4be2-ad53-f9e4e1372785}
umami.username=${UMAMI_USERNAME:}
umami.password=${UMAMI_PASSWORD:}

# 日志：减少噪音，与旧版 logback 配置一致
logging.level.root=INFO
logging.level.io.netty=WARN
logging.level.io.r2dbc=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# DDL 由 SchemaInitializer 在启动时尽力执行（数据库未就绪时不会致命），
# 因此禁用 Spring 的阻塞式 SQL 初始化，避免数据库连不上时阻止启动。
spring.sql.init.mode=never
